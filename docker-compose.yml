services:
  bot:
    build: .
    container_name: reset_flow_bot
    restart: always
    networks:
      - global_network
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://${MONGO_DB_ADMIN_USER}:${MONGO_DB_ADMIN_PASSWORD}@shared_mongodb:27017/reset_flow?authSource=admin

networks:
  global_network:
    external: true